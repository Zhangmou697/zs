<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frame 22 - 缠枝纹</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/frame22.css">
</head>
<body>
    <div class="page-container">
        <div class="frame22">
            <img src="../.figma/image/mo5jmlkr-vzh8x2z.png" class="image25" />
            <img src="../.figma/image/mo5jmlkr-7552fyd.png" class="a9E220Ec1A88Ff6Ff432" />
            
            <p class="a2000">2000+</p>
            <p class="yEarsago">YEARS AGO</p>
            
            <div class="ellipse136"></div>
            
            <p class="text">缠枝纹</p>
            <p class="text2">原型</p>
            
            <div class="ellipse138"></div>
            
            <p class="text3">自然中蜿蜒向上的藤蔓植物</p>
            
            <div class="line50"></div>
            
            <p class="text4">
                风柳摇丝花缠枝，满目韶辉。
            </p>
            
            <p class="text7">
                <span class="text5">渊源:</span>
                <span class="text6">来源于自然界中藤蔓类植物的缠绕生长形态，<br /><br />将其抽象为寓意生生不息、福禄绵长的装饰母题。</span>
            </p>
            
            <img src="../.figma/image/mo5jmlkr-m8habb8.png" class="a8968A1313A0396D8916" />
            <img src="../.figma/image/mo5jmlkp-tlua2a7.png" class="arrow17" />
        </div>
        
        <!-- Global Fixed Navigation Bar -->
        <div class="group112 nav-bar">
            <div class="rectangle314"></div>
            <div class="autoWrapper nav-content">
                <div class="nav-left">
                    <p class="text8 nav-text">首页</p>
                    <div class="line502 nav-line"></div>
                    <p class="text9 nav-text">展览馆</p>
                </div>
                <div class="nav-right">
                    <p class="text10 nav-text">纹饰之美</p>
                    <div class="line51 nav-line"></div>
                    <p class="text11 nav-text">工艺之蕴</p>
                    <div class="line52 nav-line"></div>
                    <p class="text12 nav-text">传承之新</p>
                    <img src="../.figma/image/screenshot_1118_12.png" id="nav-audio-btn" style="cursor: pointer;" class="eeee1 nav-icon" onerror="this.src='../.figma/image/mo5cmalb-ebx9uao.png'" />
                </div>
            </div>
        </div>
    </div>

    <script>
        // Entry animation (sliding up from bottom)
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.frame22');
            
            const urlParams = new URLSearchParams(window.location.search);
            const from = urlParams.get('from');

            if (from === 'frame23') {
                container.style.transform = 'translateY(-100%)';
            } else {
                container.style.transform = 'translateY(100%)';
            }
            
            requestAnimationFrame(() => {
                container.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                container.style.transform = 'translateY(0)';
                
                // Add staggered animation to elements
                setTimeout(() => {
                    const elementsToAnimate = [
                        '.a2000',
                        '.text',
                        '.yEarsago',
                        '.text2',
                        '.ellipse138',
                        '.text7 .text5',
                        '.text7 .text6',
                        '.text4'
                    ];
                    
                    elementsToAnimate.forEach((selector, index) => {
                        const el = document.querySelector(selector);
                        if (el) {
                            el.style.animationDelay = `${index * 0.15}s`;
                            el.classList.add('animate-fade-right');
                        }
                    });
                }, 400); // Start staggered animation halfway through page transition
            });
        });

        // Music toggle
        document.querySelectorAll('.eeee1').forEach(icon => {
            icon.style.cursor = 'pointer';
            icon.addEventListener('click', () => {
                if (icon.style.opacity === '0.5') {
                    icon.style.opacity = '1';
                } else {
                    icon.style.opacity = '0.5';
                }
            });
        });

        // Navigate back to index
        document.querySelectorAll('.text8').forEach(el => {
            el.style.cursor = 'pointer';
            el.addEventListener('click', () => {
                window.location.href = '../home.html';
            });
        });

        // Navigate to exhibition gallery
        document.querySelectorAll('.text9').forEach(p => {
            p.style.cursor = 'pointer';
            p.addEventListener('click', () => {
                window.location.href = 'frame31.html';
            });
        });
        
        // Navigation on scroll
        let isNavigating = false;
        window.addEventListener('wheel', (e) => {
            if (isNavigating) return;
            
            const container = document.querySelector('.frame22');
            
            if (e.deltaY < 0) { // Scrolling up -> Go back to frame 21 (slide down)
                isNavigating = true;
                container.style.transform = 'translateY(100%)';
                
                setTimeout(() => {
                    window.location.href = 'frame21.html?from=frame22';
                }, 800);
            } else if (e.deltaY > 0) { // Scrolling down -> Go to next frame (Frame 23)
                // Note: The arrow points right, so it's a right-slide to frame 23 (meaning container moves left)
                isNavigating = true;
                container.style.transform = 'translateX(-100%)';
                
                setTimeout(() => {
                    window.location.href = 'frame23.html?from=frame22';
                }, 800);
            }
        }, { passive: false });
    </script>
<script>
    // 全局导航栏跳转逻辑
    document.querySelectorAll('p').forEach(p => {
      const text = p.textContent.trim();
      if (['首页', '展览馆', '纹饰之美', '工艺之蕴', '传承之新', 'The Artistic'].includes(text)) {
        p.style.cursor = 'pointer';
        p.addEventListener('click', () => {
          if (text === '首页') {
            window.location.href = "../home.html";
          } else if (text === '展览馆') {
            window.location.href = 'frame32.html';
          } else if (text === '纹饰之美') {
            window.location.href = "../home.html#beauty";
          } else if (text === '工艺之蕴' || text === 'The Artistic') {
            window.location.href = "../home.html#craftsmanship";
          } else if (text === '传承之新') {
            window.location.href = "../home.html#new";
          }
        });
      }
    });
</script>

<audio id="nav-audio-player" src="audio/demo1.mp3" loop preload="auto"></audio></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const navBtn = document.getElementById('nav-audio-btn');
    let navAudio = null;

    // Try to get audio from parent iframe
    try {
        if (window.parent && window.parent.document) {
            navAudio = window.parent.document.getElementById('global-audio-player');
        }
    } catch(e) {}
    
    // Fallback if not inside iframe
    if (!navAudio) {
        navAudio = document.getElementById('nav-audio-player');
    }

    if(navBtn && navAudio) {
        navAudio.volume = 0.5;
        
        const updateVisuals = () => {
            if (!navAudio.paused) {
                navBtn.style.opacity = '1';
            } else {
                navBtn.style.opacity = '0.5';
            }
        };
        
        // Initial state
        navBtn.src = '../.figma/image/screenshot_1103_603.png';
        updateVisuals();

        navBtn.addEventListener('click', () => {
            if(!navAudio.paused) {
                navAudio.pause();
            } else {
                navAudio.play().catch(e => console.log('Nav audio play failed:', e));
            }
            updateVisuals();
        });
        
        // Listen to events in case parent or other frames change it
        navAudio.addEventListener('play', updateVisuals);
        navAudio.addEventListener('pause', updateVisuals);
        
        // Clean up listeners when page unloads to prevent memory leaks in parent
        window.addEventListener('unload', () => {
            navAudio.removeEventListener('play', updateVisuals);
            navAudio.removeEventListener('pause', updateVisuals);
        });
    }
});
</script>
</body>
</html>
