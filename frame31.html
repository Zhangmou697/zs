            <p class="text3">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;南宋露筋，妙在“釉”。石灰碱釉的出现，让瓷釉可厚施至毫米以上。匠人刻划莲瓣时，特意让花瓣中脊微微隆起，形成立体的棱线。施以厚釉后，凸起的脊线处釉料流散变薄，而凹陷处釉层堆积。烧成那一刻，造化显现：凸脊因釉薄透出胎骨的浅色，如筋骨隐隐浮现，这便是“露筋”或“出筋”。凹处则釉厚如玉，青翠温润。一浅一深，一透一掩。凸脊清晰挺秀，积釉丰腴欲滴。纹样不再独立于器，而与厚釉相互成就，与碗形浑然一体。露筋工艺，让南宋瓷器于含蓄中见筋骨，于温润中藏力度。&nbsp;</p>

<script>
    // 全局导航栏跳转逻辑
    document.querySelectorAll('p').forEach(p => {
      const text = p.textContent.trim();
      if (['首页', '展览馆', '纹饰之美', '工艺之蕴', '传承之新', 'The Artistic'].includes(text)) {

        p.addEventListener('click', () => {
          if (text === '首页') {
            window.location.href = "../home.html";
          } else if (text === '展览馆') {
            window.location.href = 'frame32.html';
          } else if (text === '纹饰之美') {
            window.location.href = "../home.html#beauty";
          } else if (text === '工艺之蕴' || text === 'The Artistic') {
            window.location.href = "../home.html#craftsmanship";
          } else if (text === '传承之新') {
            window.location.href = "../home.html#new";
          }

</script>
    <script>
        // 视频播放逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.querySelector('.video-play-btn-31');
            const thumbnail = document.querySelector('.video-thumbnail-31');
            const video = document.querySelector('.video-player-31');

            function playVideo() {
                // 隐藏缩略图和播放按钮
                if(playBtn) playBtn.style.opacity = '0';
                if(thumbnail) thumbnail.style.opacity = '0';
                
                setTimeout(() => {
                    if(playBtn) playBtn.style.display = 'none';
                    if(thumbnail) thumbnail.style.display = 'none';
                    // 显示视频并播放
                    if(video) {
                        video.style.display = 'block';
                        video.play().catch(e => {
                            console.log("视频播放失败，请检查视频路径是否正确：", e);
                        });
                    }
                }, 300);
            }

            if (playBtn && thumbnail && video) {
                playBtn.addEventListener('click', playVideo);
                thumbnail.addEventListener('click', playVideo);
            }
        });
    </script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const navBtn = document.getElementById('nav-audio-btn');
    let navAudio = null;

    // Try to get audio from parent iframe
    try {
        if (window.parent && window.parent.document) {
            navAudio = window.parent.document.getElementById('global-audio-player');
        }
    } catch(e) {}
    
    // Fallback if not inside iframe
    if (!navAudio) {
        navAudio = document.getElementById('nav-audio-player');
    }

    if(navBtn && navAudio) {
        navAudio.volume = 0.5;
        
        const updateVisuals = () => {
            if (!navAudio.paused) {
                navBtn.style.opacity = '1';
            } else {
                navBtn.style.opacity = '0.5';
            }
        };
        
        // Initial state
        navBtn.src = '../.figma/image/screenshot_1103_603.png';
        updateVisuals();

        navBtn.addEventListener('click', () => {
            if(!navAudio.paused) {
                navAudio.pause();
            } else {
                navAudio.play().catch(e => console.log('Nav audio play failed:', e));
            }
            updateVisuals();
        });
        
        // Listen to events in case parent or other frames change it
        navAudio.addEventListener('play', updateVisuals);
        navAudio.addEventListener('pause', updateVisuals);
        
        // Clean up listeners when page unloads to prevent memory leaks in parent
        window.addEventListener('unload', () => {
            navAudio.removeEventListener('play', updateVisuals);
            navAudio.removeEventListener('pause', updateVisuals);
        });
    }
});
</script>

<audio id="nav-audio-player" src="audio/demo1.mp3" loop preload="auto"></audio></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const navBtn = document.getElementById('nav-audio-btn');
    const navAudio = document.getElementById('nav-audio-player');
    if(navBtn && navAudio) {
        navAudio.volume = 0.5;
        let isPlaying = false;
        navBtn.addEventListener('click', () => {
            if(isPlaying) {
                navAudio.pause();
                navBtn.src = '../.figma/image/screenshot_1118_12.png';
            } else {
                navAudio.play().catch(e => console.log('Nav audio play failed:', e));
                navBtn.src = '../.figma/image/screenshot_1103_770.png';
            }
            isPlaying = !isPlaying;
        });
    }
});
</script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const localBtn = document.querySelector('.audio-btn');
    const localAudio = document.querySelector('.audio-player');
    
    if(localBtn && localAudio) {
        let isLocalPlaying = false;
        localBtn.addEventListener('click', () => {
            if(isLocalPlaying) {
                localAudio.pause();
                localBtn.style.stroke = '#888';
            } else {
                // Also pause global audio if playing
                try {
                    if (window.parent && window.parent.document) {
                        const globalAudio = window.parent.document.getElementById('global-audio-player');
                        if (globalAudio && !globalAudio.paused) {
                            const navBtn = document.getElementById('nav-audio-btn');
                            globalAudio.pause();
                            if (navBtn) navBtn.style.opacity = '0.5';
                        }
                    }
                } catch(e) {}
                
                localAudio.play().catch(e => console.log('Local audio play failed:', e));
                localBtn.style.stroke = '#000';
            }
            isLocalPlaying = !isLocalPlaying;
        });
    }
});
</script>
