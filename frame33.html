<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个性化定制 - Frame 33</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/frame33.css">
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="frame33">
            <!-- Background Images -->
            <img src="../.figma/image/mockptc6-wz1j1em.png" class="a66665" alt="" />
            <img src="../.figma/image/mockptc6-805xwe6.png" class="a9E220Ec1A88Ff6Ff432" alt="" />

            <!-- Nav Bar -->
            <div class="rectangle315"></div>
            <p class="text12 nav-text" onclick="window.location.href='../home.html'">首页</p>
            <div class="line53 nav-line"></div>
            <p class="text14 nav-text" onclick="window.location.href='frame32.html'">展览馆</p>
            <p class="text13 nav-text" onclick="window.location.href='frame6.html'">纹饰之美</p>
            <div class="line54 nav-line"></div>
            <p class="text15 nav-text" onclick="window.location.href='frame15.html'">工艺之蕴</p>
            <div class="line55 nav-line"></div>
            <p class="text16 nav-text" onclick="window.location.href='frame33.html'">传承之新</p>
            <img src="../.figma/image/screenshot_1118_12.png" id="nav-audio-btn" style="cursor: pointer;" class="eeee2" alt="icon" />

            <!-- Carrier Selection -->
            <div class="group146">
                <div class="ellipse34"></div>
                <p class="text">载体选取</p>
            </div>
            <div class="rectangle377 pill-btn active" data-carrier="phone">
                <p class="text11">手机壳</p>
            </div>
            <div class="rectangle379 pill-btn" data-carrier="bookmark">
                <p class="text11">书签</p>
            </div>
            <div class="rectangle380 pill-btn" data-carrier="mug">
                <p class="text11">马克杯</p>
            </div>

            <!-- Prompt Reference -->
            <div class="group145">
                <div class="ellipse190"></div>
                <p class="text">提示词参考</p>
            </div>
            
            <div class="rectangle383">
                <div class="rectangle388">
                    <p class="text2">纹样</p>
                </div>
                <p class="text3">莲瓣纹</p>
                <p class="text4">缠枝纹</p>
            </div>
            <div class="rectangle384">
                <div class="rectangle388">
                    <p class="text2">倾向</p>
                </div>
                <p class="text5">多色</p>
                <p class="text6">纯色</p>
                <p class="text7">线稿</p>
            </div>
            <div class="rectangle385">
                <div class="rectangle388">
                    <p class="text2">构图</p>
                </div>
                <p class="text8">S型</p>
                <p class="text9">团型</p>
                <p class="text10">四方连续</p>
            </div>

            <!-- Model Color Adjustment Header -->
            <div class="group144">
                <div class="ellipse190"></div>
                <p class="text">模型色彩调整</p>
            </div>

            <!-- Color Picker & Pattern Position UI -->
            <div class="rectangle392" style="background: rgba(232, 240, 235, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0px 4px 4px 0px rgba(0, 0, 0, 0.25); padding: 40px; display: flex; flex-direction: row; justify-content: space-around; align-items: center; width: 566px; left: 65px; height: 212px;">
                <!-- Left: Color Picker -->
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <p class="color-picker-label" style="font-size: 16px; font-weight: 500; margin-bottom: 15px; color: #000;">点击调整模型颜色：</p>
                    <input type="color" id="model-color-picker" class="color-picker-input" value="#ffffff" style="width: 120px; height: 60px; padding: 0; cursor: pointer; border: 2px solid #ccc; border-radius: 8px;">
                </div>
                
                <!-- Divider -->
                <div style="width: 1px; height: 80%; background-color: #e0e0e0;"></div>

                <!-- Right: Pattern Position & Scale Sliders -->
                <div style="display: flex; flex-direction: column; align-items: center; width: 50%;">
                    <p style="font-size: 16px; font-weight: 500; margin-bottom: 10px; color: #000; margin-top: 0;">调整纹样：</p>
                    
                    <div style="display: flex; align-items: center; margin-bottom: 8px; width: 100%;">
                        <span style="font-size: 14px; margin-right: 10px; width: 45px;">水平(X)</span>
                        <input type="range" id="pattern-x" min="-1" max="1" step="0.01" value="0" style="flex-grow: 1; cursor: pointer;">
                    </div>
                    
                    <div style="display: flex; align-items: center; margin-bottom: 8px; width: 100%;">
                        <span style="font-size: 14px; margin-right: 10px; width: 45px;">垂直(Y)</span>
                        <input type="range" id="pattern-y" min="-1" max="1" step="0.01" value="0" style="flex-grow: 1; cursor: pointer;">
                    </div>

                    <div style="display: flex; align-items: center; margin-bottom: 8px; width: 100%;">
                        <span style="font-size: 14px; margin-right: 10px; width: 45px;">大小(S)</span>
                        <input type="range" id="pattern-scale" min="0.1" max="5" step="0.1" value="1" style="flex-grow: 1; cursor: pointer;">
                    </div>

                    <div style="display: flex; align-items: center; width: 100%;">
                        <span style="font-size: 14px; margin-right: 10px; width: 45px;">旋转(R)</span>
                        <input type="range" id="pattern-rotation" min="-180" max="180" step="1" value="0" style="flex-grow: 1; cursor: pointer;">
                    </div>
                </div>
            </div>

            <!-- 3D Preview and 2D Overlay -->
            <div class="rectangle387" id="container-3d">
                <div id="status-3d" class="status-overlay">正在加载 3D 模型...</div>
                
                <div class="rectangle386">
                    <img id="canvas-2d" src="" alt="2D Pattern Preview" style="opacity: 0.1;" />
                    <div id="status-2d" class="status-overlay" style="font-size: 12px; text-align: center; padding: 4px; display: none;">大模型解析中...</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Frontend Logic for Interaction, LLM, and Three.js -->
    <script>
        // --- 1. 基础交互逻辑 ---
        const pills = document.querySelectorAll('.pill-btn');
        let currentCarrier = 'phone';
        
        pills.forEach(pill => {
            pill.addEventListener('click', (e) => {
                pills.forEach(p => p.classList.remove('active'));
                const pillDiv = e.target.closest('.pill-btn');
                pillDiv.classList.add('active');
                currentCarrier = pillDiv.dataset.carrier;
                update3DModel(currentCarrier);
            });
        });

        // 色盘逻辑
        const colorPicker = document.getElementById('model-color-picker');
        colorPicker.addEventListener('input', (e) => {
            if (currentMaterial) {
                currentMaterial.color.set(e.target.value);
            }
        });

        // 纹样位置偏移与大小逻辑
        const sliderX = document.getElementById('pattern-x');
        const sliderY = document.getElementById('pattern-y');
        const sliderScale = document.getElementById('pattern-scale');
        const sliderRotation = document.getElementById('pattern-rotation');
        
        function updatePatternOffset() {
            if (currentMaterial && currentMaterial.map) {
                const texture = currentMaterial.map;
                
                // 设置中心点，让旋转和缩放围绕纹理中心进行
                texture.center.set(0.5, 0.5);

                // 调整位置 (注意 offset 受 center 影响)
                texture.offset.set(parseFloat(sliderX.value), parseFloat(sliderY.value));
                
                // 调整大小 (用户往右拖希望变大，对应的 repeat 应该变小)
                const scaleVal = parseFloat(sliderScale.value);
                texture.repeat.set(1 / scaleVal, 1 / scaleVal);

                // 调整旋转 (角度转弧度)
                const rotationDeg = parseFloat(sliderRotation.value);
                texture.rotation = THREE.MathUtils.degToRad(rotationDeg);
            }
        }
        
        sliderX.addEventListener('input', updatePatternOffset);
        sliderY.addEventListener('input', updatePatternOffset);
        sliderScale.addEventListener('input', updatePatternOffset);
        sliderRotation.addEventListener('input', updatePatternOffset);

        // --- 2. 提示词贴图逻辑 ---
        const availableCombos = [
            '缠枝纹_多色_S型',
            '缠枝纹_多色_团型',
            '缠枝纹_纯色_四方连续',
            '缠枝纹_线稿_团型',
            '莲瓣纹_多色_团型',
            '莲瓣纹_线稿_团型'
        ];

        let patternState = {
            pattern: null,
            style: null,
            comp: null
        };

        const categories = {
            pattern: Array.from(document.querySelectorAll('.rectangle383 p:not(.text2)')),
            style: Array.from(document.querySelectorAll('.rectangle384 p:not(.text2)')),
            comp: Array.from(document.querySelectorAll('.rectangle385 p:not(.text2)'))
        };

        function isValidOption(category, optionValue) {
            const testState = { ...patternState, [category]: optionValue };
            return availableCombos.some(combo => {
                const parts = combo.split('_');
                const cPattern = parts[0];
                const cStyle = parts[1];
                const cComp = parts[2];
                
                if (testState.pattern && testState.pattern !== cPattern) return false;
                if (testState.style && testState.style !== cStyle) return false;
                if (testState.comp && testState.comp !== cComp) return false;
                
                return true;
            });
        }

        function updateOptionsUI() {
            for (let cat in categories) {
                categories[cat].forEach(opt => {
                    const val = opt.innerText;
                    const isSelected = patternState[cat] === val;
                    const isValid = isValidOption(cat, val);
                    
                    if (isSelected) {
                        opt.style.fontWeight = 'bold';
                        opt.style.color = '#333';
                        opt.style.textDecoration = 'none';
                        opt.style.cursor = 'pointer';
                        opt.style.opacity = '1';
                    } else if (!isValid) {
                        opt.style.fontWeight = '100';
                        opt.style.color = '#999';
                        opt.style.textDecoration = 'line-through';
                        opt.style.cursor = 'not-allowed';
                        opt.style.opacity = '0.5';
                    } else {
                        opt.style.fontWeight = '100';
                        opt.style.color = '#000';
                        opt.style.textDecoration = 'none';
                        opt.style.cursor = 'pointer';
                        opt.style.opacity = '1';
                    }
                });
            }
        }

        for (let cat in categories) {
            categories[cat].forEach(opt => {
                opt.addEventListener('click', () => {
                    const val = opt.innerText;
                    
                    if (!isValidOption(cat, val)) return;
                    
                    if (patternState[cat] === val) {
                        patternState[cat] = null; // 取消选择
                    } else {
                        patternState[cat] = val; // 选中
                    }
                    
                    updateOptionsUI();
                    
                    if (patternState.pattern && patternState.style && patternState.comp) {
                        applyCombinationTexture();
                    } else {
                        clearTexture();
                    }
                });
            });
        }
        
        updateOptionsUI();

        function clearTexture() {
            const canvas2d = document.getElementById('canvas-2d');
            canvas2d.src = '';
            canvas2d.style.opacity = '0.1';
            
            if (currentMaterial) {
                currentMaterial.map = null;
                currentMaterial.needsUpdate = true;
            }
        }

        function applyCombinationTexture() {
            const filename = `${patternState.pattern}_${patternState.style}_${patternState.comp}.png`;
            const filepath = `textures/${filename}`;

            const canvas2d = document.getElementById('canvas-2d');
            const status2d = document.getElementById('status-2d');

            const img = new Image();
            img.onload = () => {
                canvas2d.src = filepath;
                canvas2d.style.opacity = '1';
                status2d.style.display = 'none';
                applyTextureTo3D(filepath);
            };
            img.onerror = () => {
                console.warn(`未找到贴图文件: ${filepath}`);
                status2d.style.display = 'block';
                status2d.innerText = `缺少贴图: ${filename}`;
                clearTexture();
            };
            img.src = filepath;
        }

        // --- 3. Three.js 3D 模型渲染逻辑 ---
        const container3d = document.getElementById('container-3d');
        const scene = new THREE.Scene();
        scene.background = null;

        const camera = new THREE.PerspectiveCamera(45, container3d.clientWidth / container3d.clientHeight, 0.1, 10000);
        camera.position.set(0, 0, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container3d.clientWidth, container3d.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = false;
        container3d.insertBefore(renderer.domElement, container3d.firstChild);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;
        controls.enableZoom = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.9); 
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = false;
        scene.add(dirLight);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-5, -5, -7);
        scene.add(dirLight2);

        const gltfLoader = new THREE.GLTFLoader();

        let currentMaterial;

        function createMaterial() {
            return new THREE.MeshStandardMaterial({ 
                color: colorPicker.value, // Initialize with color picker value
                roughness: 0.3,
                metalness: 0.1
            });
        }

        const currentModelGroup = new THREE.Group();
        scene.add(currentModelGroup);

        function update3DModel(carrier) {
            currentModelGroup.clear();
            currentMaterial = createMaterial();
            document.getElementById('status-3d').style.display = 'block';

            const modelMap = {
                'phone': 'models/phone.gltf',
                'earring': 'models/earring.gltf',
                'bookmark': 'models/bookmark.gltf',
                'mug': 'models/mug.gltf'
            };

            const modelPath = modelMap[carrier] || 'models/mug.gltf';

            gltfLoader.load(
                modelPath,
                (gltf) => {
                    const model = gltf.scene;
                    document.getElementById('status-3d').style.display = 'none';

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    model.position.sub(center);
                    model.updateMatrixWorld(true);

                    const newBox = new THREE.Box3().setFromObject(model);

                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.material = currentMaterial;
                            child.castShadow = false;
                            child.receiveShadow = false;
                            
                            // 强行生成全局UV映射（解决部分模型没有自带UV或UV错乱导致无法贴图的问题）
                            const pos = child.geometry.attributes.position;
                            if (pos) {
                                child.geometry.computeVertexNormals();
                                const norms = child.geometry.attributes.normal;
                                const uvs = new Float32Array(pos.count * 2);
                                
                                child.updateMatrixWorld(true);
                                const worldMatrix = child.matrixWorld;
                                const normalMatrix = new THREE.Matrix3().getNormalMatrix(worldMatrix);
                                
                                for (let i = 0; i < pos.count; i++) {
                                    const vertex = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
                                    vertex.applyMatrix4(worldMatrix);
                                    
                                    const normal = new THREE.Vector3(norms.getX(i), norms.getY(i), norms.getZ(i));
                                    normal.applyMatrix3(normalMatrix).normalize();
                                    
                                    const nx = Math.abs(normal.x);
                                    const ny = Math.abs(normal.y);
                                    const nz = Math.abs(normal.z);
                                    
                                    let u = 0, v = 0;
                                    // 盒式映射 (Box Mapping)
                                    if (nx >= ny && nx >= nz) {
                                        u = size.z > 0 ? (vertex.z - newBox.min.z) / size.z : 0;
                                        v = size.y > 0 ? (vertex.y - newBox.min.y) / size.y : 0;
                                    } else if (ny >= nx && ny >= nz) {
                                        u = size.x > 0 ? (vertex.x - newBox.min.x) / size.x : 0;
                                        v = size.z > 0 ? (vertex.z - newBox.min.z) / size.z : 0;
                                    } else {
                                        u = size.x > 0 ? (vertex.x - newBox.min.x) / size.x : 0;
                                        v = size.y > 0 ? (vertex.y - newBox.min.y) / size.y : 0;
                                    }
                                    
                                    uvs[i * 2] = isNaN(u) ? 0 : u;
                                    uvs[i * 2 + 1] = isNaN(v) ? 0 : v;
                                }
                                child.geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
                                child.geometry.attributes.uv.needsUpdate = true;
                            }
                        }
                    });

                    currentModelGroup.add(model);
                    controls.target.set(0, 0, 0);

                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.set(0, 0, maxDim * 3);
                    controls.update();

                    // Reapply texture if it exists on canvas2d
                    if (canvas2d.src && canvas2d.style.opacity === '1') {
                        applyTextureTo3D(canvas2d.src);
                    } 
                },
                undefined,
                (error) => {
                    console.warn(`无法加载 ${modelPath}，将使用备用几何体代替`, error);
                    document.getElementById('status-3d').innerText = '未找到本地模型，显示备用形状';
                    
                    let geometry;
                    if (carrier === 'phone') geometry = new THREE.BoxGeometry(1.5, 3, 0.2);
                    else if (carrier === 'earring') geometry = new THREE.TorusGeometry(0.5, 0.2, 16, 100);
                    else if (carrier === 'bookmark') geometry = new THREE.PlaneGeometry(1, 3);
                    else geometry = new THREE.CylinderGeometry(1, 1, 2, 32);

                    const currentMesh = new THREE.Mesh(geometry, currentMaterial);
                    currentModelGroup.add(currentMesh);

                    setTimeout(() => {
                        document.getElementById('status-3d').style.display = 'none';
                    }, 2000);
                }
            );
        }

        function applyTextureTo3D(url) {
            if (!currentMaterial) return;

            const textureLoader = new THREE.TextureLoader();
            textureLoader.load(url, (texture) => {
                texture.wrapS = THREE.RepeatWrapping;
                texture.wrapT = THREE.RepeatWrapping;
                texture.flipY = false;
                
                // 设置中心点，让旋转和缩放围绕纹理中心进行
                texture.center.set(0.5, 0.5);

                // 应用当前的偏移量和缩放大小
                texture.offset.set(parseFloat(sliderX.value), parseFloat(sliderY.value));
                const scaleVal = parseFloat(sliderScale.value);
                texture.repeat.set(1 / scaleVal, 1 / scaleVal);

                // 应用当前的旋转角度
                const rotationDeg = parseFloat(sliderRotation.value);
                texture.rotation = THREE.MathUtils.degToRad(rotationDeg);

                currentMaterial.map = texture;
                currentMaterial.needsUpdate = true;
            });
        }

        update3DModel('phone');

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = container3d.clientWidth / container3d.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container3d.clientWidth, container3d.clientHeight);
        });
    </script>

<audio id="nav-audio-player" src="audio/demo1.mp3" loop preload="auto"></audio></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const navBtn = document.getElementById('nav-audio-btn');
    let navAudio = null;

    // Try to get audio from parent iframe
    try {
        if (window.parent && window.parent.document) {
            navAudio = window.parent.document.getElementById('global-audio-player');
        }
    } catch(e) {}
    
    // Fallback if not inside iframe
    if (!navAudio) {
        navAudio = document.getElementById('nav-audio-player');
    }

    if(navBtn && navAudio) {
        navAudio.volume = 0.5;
        
        const updateVisuals = () => {
            if (!navAudio.paused) {
                navBtn.style.opacity = '1';
            } else {
                navBtn.style.opacity = '0.5';
            }
        };
        
        // Initial state
        navBtn.src = '../.figma/image/screenshot_1103_603.png';
        updateVisuals();

        navBtn.addEventListener('click', () => {
            if(!navAudio.paused) {
                navAudio.pause();
            } else {
                navAudio.play().catch(e => console.log('Nav audio play failed:', e));
            }
            updateVisuals();
        });
        
        // Listen to events in case parent or other frames change it
        navAudio.addEventListener('play', updateVisuals);
        navAudio.addEventListener('pause', updateVisuals);
        
        // Clean up listeners when page unloads to prevent memory leaks in parent
        window.addEventListener('unload', () => {
            navAudio.removeEventListener('play', updateVisuals);
            navAudio.removeEventListener('pause', updateVisuals);
        });
    }
});
</script>
</body>
