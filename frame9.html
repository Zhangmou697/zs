<body>
    <div class="page-container">
        <div class="frame9">
            <img src="../.figma/image/mo5qefj3-0dcaimz.png" class="a66663" />
            <img src="../.figma/image/mo5qefj3-t4a7yh4.png" class="a9E220Ec1A88Ff6Ff432" />
            
            <p class="text">青釉莲瓣纹直口碗</p>
            <p class="text2">工艺/</p>
            <p class="text3">露筋</p>
            <p class="text4">莲瓣纹</p>
            <p class="text5">纹样/</p>
            <p class="text6">此碗为宋代龙泉窑典型器，直口，深腹，圈足，造型规整端庄。通体施青釉，釉色清灰，温润含蓄，器身内外满釉，口部略露胎。外壁装饰莲瓣纹，莲瓣以碗底为中心，向外呈辐射状绽放，瓣幅细长，由下至上宽度变化不大，接近直条状。每瓣中脊略微突起，呈现“出筋”效果，立体感强，外侧以单线勾勒轮廓。莲瓣纹雕刻精细，层次分明，中脊凸起与单线勾勒相得益彰。为南宋龙泉窑莲瓣纹器的代表之作，展现当时刻花工艺的精湛与审美意趣。</p>
            
            <img src="../.figma/image/mo5qefj3-bm090jw.png" class="a55643F18D7B1Cb24784 video-thumbnail" style="cursor: pointer; z-index: 1; transition: opacity 0.3s ease;" />

    <script>
        // Entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.frame9');
            container.style.opacity = '0';
            requestAnimationFrame(() => {
                container.style.transition = 'opacity 0.8s ease';
                container.style.opacity = '1';
            });
        });
    </script>
<script>
    // 全局导航栏跳转逻辑
    document.querySelectorAll('p').forEach(p => {
      const text = p.textContent.trim();
      if (['首页', '展览馆', '纹饰之美', '工艺之蕴', '传承之新', 'The Artistic'].includes(text)) {
        p.style.cursor = 'pointer';
        p.addEventListener('click', () => {
          if (text === '首页') {
            window.location.href = "../home.html";
          } else if (text === '展览馆') {
            window.location.href = 'frame32.html';
          } else if (text === '纹饰之美') {
            window.location.href = "../home.html#beauty";
          } else if (text === '工艺之蕴' || text === 'The Artistic') {
            window.location.href = "../home.html#craftsmanship";
          } else if (text === '传承之新') {
            window.location.href = "../home.html#new";
          }
        });
      }
    });
</script>
    <script>
        // 视频播放逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const playBtn = document.querySelector('.video-play-btn');
            const thumbnail = document.querySelector('.video-thumbnail');
            const video = document.querySelector('.video-player');

            function playVideo() {
                // 隐藏缩略图和播放按钮
                playBtn.style.opacity = '0';
                thumbnail.style.opacity = '0';
                
                setTimeout(() => {
                    playBtn.style.display = 'none';
                    thumbnail.style.display = 'none';
                    // 显示视频并播放
                    video.style.display = 'block';
                    video.play().catch(e => {
                        console.log("视频播放失败，请检查视频路径是否正确：", e);
                    });
                }, 300);
            }

            if (playBtn && thumbnail && video) {
                playBtn.addEventListener('click', playVideo);
                thumbnail.addEventListener('click', playVideo);
            }
        });
    </script>

<audio id="nav-audio-player" src="audio/demo1.mp3" loop preload="auto"></audio></audio>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const navBtn = document.getElementById('nav-audio-btn');
    let navAudio = null;

    // Try to get audio from parent iframe
    try {
        if (window.parent && window.parent.document) {
            navAudio = window.parent.document.getElementById('global-audio-player');
        }
    } catch(e) {}
    
    // Fallback if not inside iframe
    if (!navAudio) {
        navAudio = document.getElementById('nav-audio-player');
    }

    if(navBtn && navAudio) {
        navAudio.volume = 0.5;
        
        const updateVisuals = () => {
            if (!navAudio.paused) {
                navBtn.style.opacity = '1';
            } else {
                navBtn.style.opacity = '0.5';
            }
        };
        
        // Initial state
        navBtn.src = '../.figma/image/screenshot_1103_603.png';
        updateVisuals();

        navBtn.addEventListener('click', () => {
            if(!navAudio.paused) {
                navAudio.pause();
            } else {
                navAudio.play().catch(e => console.log('Nav audio play failed:', e));
            }
            updateVisuals();
        });
        
        // Listen to events in case parent or other frames change it
        navAudio.addEventListener('play', updateVisuals);
        navAudio.addEventListener('pause', updateVisuals);
        
        // Clean up listeners when page unloads to prevent memory leaks in parent
        window.addEventListener('unload', () => {
            navAudio.removeEventListener('play', updateVisuals);
            navAudio.removeEventListener('pause', updateVisuals);
        });
    }
});
</script>
</body>
</html>
